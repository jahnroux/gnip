<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>gnip</title>
  <link rel="stylesheet" href="/lib/uplot/uPlot.min.css" />
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: #0e1116; color: #d8dee9;
      font: 14px/1.4 system-ui, "Segoe UI", Roboto, sans-serif;
    }
    header {
      display: flex; align-items: baseline; gap: 1.5rem; flex-wrap: wrap;
      padding: 12px 18px; border-bottom: 1px solid #1e2530; background: #11151c;
    }
    header h1 { font-size: 16px; margin: 0; font-weight: 600; letter-spacing: .5px; }
    header h1 .host { color: #4fc3f7; }
    .stats { display: flex; gap: 1.25rem; margin-left: auto; flex-wrap: wrap; }
    .stat { display: flex; flex-direction: column; min-width: 48px; }
    .stat .label { font-size: 10px; text-transform: uppercase; letter-spacing: .5px; color: #6b7686; }
    .stat .value { font-size: 16px; font-variant-numeric: tabular-nums; }
    .stat .value.loss { color: #ef5350; }
    .stat .value.ok { color: #66bb6a; }
    #controls { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; padding: 8px 18px; border-bottom: 1px solid #1e2530; background: #0f141b; }
    #controls .ranges, #controls .seek { display: flex; gap: 6px; align-items: center; }
    #controls button { background: #1a212c; color: #c8d0da; border: 1px solid #283143; border-radius: 4px; padding: 4px 10px; font: inherit; font-size: 12px; cursor: pointer; }
    #controls button:hover { background: #222b38; }
    #controls button.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }
    #controls button:disabled { opacity: .4; cursor: default; }
    #range-label { font-size: 12px; color: #8b94a3; font-variant-numeric: tabular-nums; margin-left: 4px; }
    #settings { position: fixed; top: 0; right: 0; width: 320px; height: 100%; background: #11151c; border-left: 1px solid #1e2530; padding: 18px; z-index: 10; box-shadow: -8px 0 24px rgba(0,0,0,.45); overflow: auto; }
    #settings.hidden { display: none; }
    #settings h3 { margin: 0 0 4px; font-size: 14px; }
    #settings label { display: block; font-size: 12px; color: #9aa4b2; margin: 12px 0; }
    #settings input { display: block; width: 100%; margin-top: 4px; background: #0e1116; border: 1px solid #283143; color: #d8dee9; border-radius: 4px; padding: 6px 8px; font: inherit; }
    #settings .actions { margin-top: 18px; display: flex; gap: 8px; align-items: center; }
    #settings .actions button { background: #1f6feb; border: 1px solid #1f6feb; color: #fff; border-radius: 4px; padding: 6px 14px; font: inherit; font-size: 13px; cursor: pointer; }
    #settings .actions button#f-cancel { background: #1a212c; border-color: #283143; color: #c8d0da; }
    #f-msg { font-size: 12px; color: #66bb6a; }
    #f-msg.err { color: #ef5350; }
    #chart { padding: 14px 8px; }
    .conn { font-size: 13px; }
    .conn.live { color: #66bb6a; }
    .conn.down { color: #ef5350; }
    .conn.hist { color: #b0a44f; }
    .conn::before { content: "\25CF\00a0"; }
  </style>
</head>
<body>
  <header>
    <h1>gnip &mdash; <span class="host" id="host">&hellip;</span></h1>
    <div class="stats">
      <div class="stat"><span class="label">Current</span><span class="value" id="s-cur">&mdash;</span></div>
      <div class="stat"><span class="label">Min</span><span class="value" id="s-min">&mdash;</span></div>
      <div class="stat"><span class="label">Avg</span><span class="value" id="s-avg">&mdash;</span></div>
      <div class="stat"><span class="label">Max</span><span class="value" id="s-max">&mdash;</span></div>
      <div class="stat"><span class="label">Loss</span><span class="value" id="s-loss">&mdash;</span></div>
      <div class="stat"><span class="label">Window</span><span class="value" id="s-win">&mdash;</span></div>
      <div class="stat"><span class="label">Stream</span><span class="conn down" id="conn">connecting</span></div>
    </div>
  </header>
  <div id="controls">
    <div class="ranges">
      <button data-live="1" class="active">Live</button>
      <button data-sec="900">15m</button>
      <button data-sec="3600">1h</button>
      <button data-sec="21600">6h</button>
      <button data-sec="86400">24h</button>
    </div>
    <div class="seek">
      <button id="older">&#9664; Older</button>
      <button id="newer">Newer &#9654;</button>
      <button id="zoomout">Zoom out</button>
      <span id="range-label"></span>
    </div>
    <button id="settings-btn" title="Settings" style="margin-left:auto">&#9881; Settings</button>
  </div>
  <div id="settings" class="hidden">
    <h3>Settings</h3>
    <label>Target host <input id="f-host" /></label>
    <label>Ping interval (seconds) <input id="f-interval" type="number" min="1" /></label>
    <label>Timeout (ms) <input id="f-timeout" type="number" min="1" /></label>
    <label>Live window (seconds) <input id="f-window" type="number" min="5" /></label>
    <label>High-latency threshold (ms) <input id="f-threshold" type="number" min="1" /></label>
    <label>Retention (hours) <input id="f-retention" type="number" min="1" /></label>
    <div class="actions">
      <button id="f-save">Save</button>
      <button id="f-cancel">Cancel</button>
      <span id="f-msg"></span>
    </div>
  </div>
  <div id="chart"></div>
  <script src="/lib/uplot/uPlot.iife.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
